<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — BeastPay</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0b1020;color:#e5e7eb;min-height:100vh}
    .wrap{max-width:820px;margin:0 auto;padding:28px}
    .card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:22px}
    h1{font-size:20px;margin-bottom:8px}
    .sub{color:#a5b4fc;font-size:13px;margin-bottom:18px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    label{display:block;font-size:12px;color:#cbd5e1;margin:10px 0 6px}
    input,select{width:100%;padding:11px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.14);background:rgba(0,0,0,0.28);color:#e5e7eb;outline:none}
    input:focus,select:focus{border-color:#818cf8}
    .providers{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}
    .pbtn{padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.14);background:rgba(0,0,0,0.24);cursor:pointer;text-align:center}
    .pbtn:hover{border-color:#818cf8}
    .pbtn.sel{border-color:#818cf8;background:rgba(129,140,248,0.14)}
    .pname{font-weight:700;font-size:13px}
    .pdesc{font-size:11px;color:#cbd5e1;margin-top:4px}
    .actions{display:flex;gap:10px;margin-top:16px}
    .btn{flex:1;padding:13px 14px;border:none;border-radius:12px;background:linear-gradient(135deg,#6366f1,#a855f7);color:#fff;font-weight:800;cursor:pointer}
    .btn:disabled{opacity:0.55;cursor:not-allowed}
    .ghost{flex:1;padding:13px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.18);background:transparent;color:#e5e7eb;cursor:pointer}
    .msg{margin-top:14px;font-size:12px;color:#cbd5e1;line-height:1.35}
    .warn{color:#fbbf24}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Checkout</h1>
      <div class="sub">Choose a provider. Card details are entered on the provider’s hosted page (PCI-safe).</div>

      <div class="row">
        <div>
          <label>Amount (USD)</label>
          <input id="amount" type="number" min="1" step="0.01" placeholder="100.00" />
        </div>
        <div>
          <label>Receive Crypto</label>
          <select id="crypto">
            <option value="USDT">USDT</option>
            <option value="USDC">USDC</option>
            <option value="BTC">BTC</option>
            <option value="ETH">ETH</option>
          </select>
        </div>
      </div>

      <label>Email (optional)</label>
      <input id="email" type="email" placeholder="you@example.com" />

      <label>Destination wallet (required for fiat-to-crypto)</label>
      <input id="wallet" type="text" placeholder="0x... / T... / bc1..." />

      <label>Pay via</label>
      <div class="providers" id="providers">
        <div class="pbtn sel" data-provider="stripe" onclick="selectProvider('stripe')">
          <div class="pname">Stripe</div>
          <div class="pdesc">Card (hosted)</div>
        </div>
        <div class="pbtn" data-provider="transak" onclick="selectProvider('transak')">
          <div class="pname">Transak</div>
          <div class="pdesc">Fiat→crypto</div>
        </div>
        <div class="pbtn" data-provider="moonpay" onclick="selectProvider('moonpay')">
          <div class="pname">MoonPay</div>
          <div class="pdesc">Fiat→crypto</div>
        </div>
        <div class="pbtn" data-provider="metamask" onclick="selectProvider('metamask')">
          <div class="pname">MetaMask</div>
          <div class="pdesc">Wallet-native</div>
        </div>
      </div>

      <div class="actions">
        <button class="btn" id="go" onclick="start()">Continue →</button>
        <button class="ghost" onclick="openStatus()">View Status</button>
      </div>

      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script>
    const API_BASE = "__BASE_URL__";
    const INITIAL_PAYMENT_ID = "__PAYMENT_ID__";
    let selectedProvider = "stripe";
    let paymentId = (INITIAL_PAYMENT_ID && INITIAL_PAYMENT_ID !== "__PAYMENT_ID__") ? INITIAL_PAYMENT_ID : null;

    function selectProvider(p) {
      selectedProvider = p;
      document.querySelectorAll(".pbtn").forEach(el => {
        el.classList.toggle("sel", el.dataset.provider === p);
      });
    }

    function setMsg(text, isWarn=false) {
      const el = document.getElementById("msg");
      el.textContent = text || "";
      el.className = "msg" + (isWarn ? " warn" : "");
    }

    function openStatus() {
      if (!paymentId) {
        setMsg("Create a payment first.", true);
        return;
      }
      window.location.href = `/checkout/${encodeURIComponent(paymentId)}`;
    }

    async function start() {
      setMsg("");
      const btn = document.getElementById("go");
      btn.disabled = true;
      btn.textContent = "Working…";
      try {
        const amount = parseFloat(document.getElementById("amount").value || "0");
        if (!(amount > 0)) throw new Error("Enter a valid amount.");
        const crypto = document.getElementById("crypto").value || "USDT";
        const email = (document.getElementById("email").value || "").trim() || null;
        const wallet = (document.getElementById("wallet").value || "").trim() || null;
        if (selectedProvider !== "stripe" && !wallet) throw new Error("Enter the destination wallet address.");

        if (!paymentId) {
          const r = await fetch(`${API_BASE}/api/public/payments`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
	            body: JSON.stringify({
	              fiat_amount: amount,
	              fiat_currency: "USD",
	              crypto_ticker: crypto,
	              provider_id: selectedProvider,
	              customer_email: email,
	              wallet_address: wallet
	            })
	          });
          const j = await r.json();
          if (!r.ok) throw new Error(j?.detail || j?.error || "Failed to create payment");
          paymentId = j.payment_id;
        }

        const r2 = await fetch(`${API_BASE}/api/public/payments/${encodeURIComponent(paymentId)}/start/${encodeURIComponent(selectedProvider)}`, {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({wallet_address: wallet, customer_email: email})
        });
        const j2 = await r2.json();
        if (!r2.ok) throw new Error(j2?.detail || j2?.error || "Failed to start provider checkout");
        if (!j2.redirect_url) throw new Error("Provider did not return redirect_url");
        window.location.href = j2.redirect_url;
      } catch (e) {
        setMsg(String(e?.message || e), true);
      } finally {
        btn.disabled = false;
        btn.textContent = "Continue →";
      }
    }
  </script>
</body>
</html>
