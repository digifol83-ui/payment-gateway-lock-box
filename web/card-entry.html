<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeastPay Card Entry</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .row-3 {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 10px;
        }

        .payment-amount {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .amount-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .amount-row strong {
            color: #333;
        }

        .amount-row span {
            color: #667eea;
            font-weight: 600;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .security-info {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }

        .security-info svg {
            width: 16px;
            height: 16px;
            vertical-align: middle;
            margin-right: 5px;
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .success {
            background: #efe;
            border: 1px solid #cfc;
            color: #3c3;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .note {
            background: #f0f4ff;
            border-left: 3px solid #667eea;
            padding: 12px;
            margin-top: 20px;
            border-radius: 4px;
            font-size: 13px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">💳 BeastPay</div>
            <div class="subtitle">Secure Card Entry & Lockbox Storage</div>
        </div>

        <div id="message"></div>

        <div class="payment-amount">
            <div class="amount-row">
                <strong>Amount</strong>
                <span id="display-amount">0 USD</span>
            </div>
            <div class="amount-row">
                <strong>Crypto</strong>
                <span id="display-crypto">USDT</span>
            </div>
            <div class="amount-row">
                <strong>Method</strong>
                <span id="display-method">Secure Vault</span>
            </div>
        </div>

        <form id="cardForm">
            <!-- Cardholder Name -->
            <div class="form-group">
                <label for="cardholder">Cardholder Name *</label>
                <input type="text" id="cardholder" name="cardholder" placeholder="John Doe" required>
            </div>

            <!-- Card Number -->
            <div class="form-group">
                <label for="cardNumber">Card Number *</label>
                <input type="text" id="cardNumber" name="cardNumber" placeholder="4532 1488 0343 6467" maxlength="19" required>
            </div>

            <!-- Expiry & CVV -->
            <div class="form-group">
                <label>Card Details *</label>
                <div class="row">
                    <input type="text" id="expiry" name="expiry" placeholder="MM/YY" maxlength="5" required>
                    <input type="text" id="cvv" name="cvv" placeholder="CVV" maxlength="4" required>
                </div>
            </div>

            <!-- Billing Address -->
            <div class="form-group">
                <label for="billingStreet">Billing Street *</label>
                <input type="text" id="billingStreet" name="billingStreet" placeholder="123 Main St" required>
            </div>

            <div class="form-group">
                <label>City & State *</label>
                <div class="row">
                    <input type="text" id="billingCity" name="billingCity" placeholder="Dubai" required>
                    <input type="text" id="billingState" name="billingState" placeholder="DXB" required>
                </div>
            </div>

            <div class="form-group">
                <label for="billingZip">Postal Code *</label>
                <input type="text" id="billingZip" name="billingZip" placeholder="00000" required>
            </div>

            <button type="submit" id="submitBtn">
                <span id="btnText">Save to Secure Vault</span>
            </button>

            <div class="security-info">
                🔒 Bank-grade AES-256-GCM encryption
            </div>
        </form>

        <div class="note">
            <strong>📌 Test Mode:</strong> Use test card <code>4532 1488 0343 6467</code> with any future expiry and any 3-digit CVV.
        </div>
    </div>

    <script>
        // Format card number with spaces
        document.getElementById('cardNumber').addEventListener('input', (e) => {
            let value = e.target.value.replace(/\s/g, '');
            let formatted = value.replace(/(\d{4})/g, '$1 ').trim();
            e.target.value = formatted;
        });

        // Format expiry MM/YY
        document.getElementById('expiry').addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length >= 2) {
                value = value.substring(0, 2) + '/' + value.substring(2, 4);
            }
            e.target.value = value;
        });

        // CVV only digits
        document.getElementById('cvv').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
        });

        // Get URL params for amount & crypto
        const params = new URLSearchParams(window.location.search);
        const amount = params.get('amount') || '100';
        const crypto = params.get('crypto') || 'USDT';
        const currency = params.get('currency') || 'USD';

        document.getElementById('display-amount').textContent = `${amount} ${currency}`;
        document.getElementById('display-crypto').textContent = crypto;

        // Form submission
        document.getElementById('cardForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            submitBtn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span>Processing...';

            const cardData = {
                cardholder_name: document.getElementById('cardholder').value,
                card_number: document.getElementById('cardNumber').value.replace(/\s/g, ''),
                expiry_date: document.getElementById('expiry').value,
                cvv: document.getElementById('cvv').value,
                billing_street: document.getElementById('billingStreet').value,
                billing_city: document.getElementById('billingCity').value,
                billing_state: document.getElementById('billingState').value,
                billing_zip: document.getElementById('billingZip').value,
            };

            try {
                const response = await fetch('/api/lockbox/store-card', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(cardData),
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.detail || 'Failed to save card');
                }

                // Success
                const messageDiv = document.getElementById('message');
                messageDiv.innerHTML = `<div class="success">
                    ✅ Card saved securely! Card ID: <code>${result.card_id}</code><br>
                    You can now use this card for payments.
                </div>`;

                document.getElementById('cardForm').reset();
                submitBtn.disabled = false;
                btnText.textContent = 'Save to Secure Vault';

                // Redirect after 3 seconds
                setTimeout(() => {
                    window.location.href = `/lockbox/payment?card_id=${result.card_id}`;
                }, 3000);

            } catch (error) {
                const messageDiv = document.getElementById('message');
                messageDiv.innerHTML = `<div class="error">
                    ❌ ${error.message}
                </div>`;
                submitBtn.disabled = false;
                btnText.textContent = 'Save to Secure Vault';
            }
        });
    </script>
</body>
</html>
