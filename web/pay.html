<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Complete Payment</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
         background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
         min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#fff;border-radius:16px;padding:36px;max-width:460px;width:100%;
          box-shadow:0 20px 60px rgba(0,0,0,0.4)}
    .logo{display:flex;align-items:center;gap:10px;margin-bottom:24px}
    .logo-icon{width:42px;height:42px;background:linear-gradient(135deg,#667eea,#764ba2);
               border-radius:10px;display:flex;align-items:center;justify-content:center;
               color:#fff;font-size:20px;font-weight:bold}
    .logo-text{font-size:18px;font-weight:700;color:#1a1a2e}
    h2{font-size:22px;color:#1a1a2e;margin-bottom:6px}
    .desc{color:#6b7280;font-size:14px;margin-bottom:24px}
    .amount-box{background:linear-gradient(135deg,#667eea,#764ba2);border-radius:12px;
                padding:20px;color:#fff;text-align:center;margin-bottom:24px}
    .amount-box .amount{font-size:36px;font-weight:800}
    .amount-box .sub{font-size:13px;opacity:0.85;margin-top:4px}
    label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:4px}
    input,select{width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:8px;
                 font-size:14px;color:#1a1a2e;outline:none;transition:border 0.2s}
    input:focus,select:focus{border-color:#667eea}
    .field{margin-bottom:16px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .provider-group{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
    .provider-btn{border:2px solid #e5e7eb;border-radius:10px;padding:14px 10px;
                  cursor:pointer;text-align:center;transition:all 0.2s;background:#f9fafb}
    .provider-btn:hover{border-color:#667eea;background:#f0f0ff}
    .provider-btn.selected{border-color:#667eea;background:linear-gradient(135deg,#f0f0ff,#e8e8ff)}
    .provider-btn .name{font-weight:700;font-size:14px;color:#1a1a2e}
    .provider-btn .kyc-note{font-size:11px;color:#6b7280;margin-top:3px}
    .pay-btn{width:100%;padding:15px;background:linear-gradient(135deg,#667eea,#764ba2);
             color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;
             cursor:pointer;transition:opacity 0.2s;margin-top:4px}
    .pay-btn:hover{opacity:0.9}
    .pay-btn:disabled{opacity:0.5;cursor:not-allowed}
    .secure{display:flex;align-items:center;gap:6px;justify-content:center;
            margin-top:16px;font-size:12px;color:#9ca3af}
    .secure svg{width:14px;height:14px}
    .notice{background:#fffbeb;border:1px solid #fbbf24;border-radius:8px;
            padding:10px 14px;font-size:12px;color:#92400e;margin-bottom:16px}
    .crypto-selector{margin-bottom:16px}
    .crypto-selector label{margin-bottom:8px}
    .crypto-options{display:flex;flex-wrap:wrap;gap:8px}
    .crypto-chip{padding:6px 14px;border:1.5px solid #e5e7eb;border-radius:20px;
                 cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s;background:#fff}
    .crypto-chip:hover,.crypto-chip.selected{border-color:#667eea;background:#f0f0ff;color:#667eea}
    .error{color:#ef4444;font-size:12px;margin-top:4px}
  </style>
</head>
<body>
<div class="card" id="app">
  <div class="logo">
    <div class="logo-icon">₿</div>
    <span class="logo-text">CryptoPay Gateway</span>
  </div>
  <div id="loading" style="text-align:center;padding:40px;color:#6b7280">Loading…</div>
  <div id="main" style="display:none">
    <h2 id="pay-title">Complete Your Payment</h2>
    <p class="desc" id="pay-desc"></p>

    <div class="amount-box" id="amount-box">
      <div class="amount" id="display-amount">—</div>
      <div class="sub" id="display-sub">Enter amount below</div>
    </div>

    <!-- Variable amount input (shown when amount not fixed) -->
    <div class="field" id="amount-field" style="display:none">
      <label>Amount (USD)</label>
      <input type="number" id="input-amount" placeholder="0.00" min="1" step="0.01"/>
      <div class="error" id="err-amount"></div>
    </div>

    <!-- Crypto selector (shown when crypto not fixed) -->
    <div class="crypto-selector" id="crypto-field" style="display:none">
      <label>Receive Crypto</label>
      <div class="crypto-options" id="crypto-options"></div>
    </div>

    <div class="notice" id="kyc-notice">
      ℹ️ Payments under $200 may require no KYC. Larger amounts need a quick identity check via the provider.
    </div>

    <div class="field">
      <label>Your Email <span style="color:#ef4444">*</span></label>
      <input type="email" id="input-email" placeholder="you@example.com"/>
      <div class="error" id="err-email"></div>
    </div>
    <div class="field">
      <label>Full Name <span style="color:#9ca3af">(optional)</span></label>
      <input type="text" id="input-name" placeholder="Jane Doe"/>
    </div>

    <label style="margin-bottom:8px">Pay via</label>
    <div class="provider-group">
      <div class="provider-btn selected" data-provider="transak" onclick="selectProvider('transak')">
        <div class="name">Transak</div>
        <div class="kyc-note">No KYC &lt; $200</div>
      </div>
      <div class="provider-btn" data-provider="moonpay" onclick="selectProvider('moonpay')">
        <div class="name">MoonPay</div>
        <div class="kyc-note">Email only &lt; $150</div>
      </div>
    </div>

    <button class="pay-btn" id="pay-btn" onclick="startPayment()">
      Continue to Payment →
    </button>

    <div class="secure">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      Secured by Transak & MoonPay · No crypto wallet required
    </div>
  </div>
</div>

<script>
const LINK = __LINK_DATA__;
let selectedProvider = 'transak';
let selectedCrypto = LINK.crypto_currency || 'USDT';

const CRYPTOS = ['BTC','ETH','USDT','USDC','BNB','SOL','TRX','MATIC'];

function init() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('main').style.display = 'block';

  document.getElementById('pay-desc').textContent = LINK.description || 'Complete your crypto payment below.';

  if (LINK.amount) {
    document.getElementById('display-amount').textContent =
      LINK.amount.toLocaleString('en-US', {style:'currency', currency: LINK.fiat_currency || 'USD'});
    document.getElementById('display-sub').textContent =
      `Pay in ${LINK.fiat_currency || 'USD'} → receive ${selectedCrypto}`;
    document.getElementById('kyc-notice').style.display =
      LINK.amount >= 200 ? 'block' : 'none';
  } else {
    document.getElementById('amount-field').style.display = 'block';
    document.getElementById('display-sub').textContent = 'Enter amount above';
  }

  if (!LINK.crypto_currency) {
    const wrap = document.getElementById('crypto-field');
    wrap.style.display = 'block';
    const opts = document.getElementById('crypto-options');
    CRYPTOS.forEach(c => {
      const chip = document.createElement('div');
      chip.className = 'crypto-chip' + (c === selectedCrypto ? ' selected' : '');
      chip.textContent = c;
      chip.onclick = () => {
        document.querySelectorAll('.crypto-chip').forEach(x => x.classList.remove('selected'));
        chip.classList.add('selected');
        selectedCrypto = c;
        updateAmountDisplay();
      };
      opts.appendChild(chip);
    });
  }

  document.getElementById('input-amount')?.addEventListener('input', updateAmountDisplay);
}

function updateAmountDisplay() {
  const val = parseFloat(document.getElementById('input-amount')?.value || '0');
  if (val > 0) {
    const fiat = LINK.fiat_currency || 'USD';
    document.getElementById('display-amount').textContent =
      val.toLocaleString('en-US', {style:'currency', currency: fiat});
    document.getElementById('display-sub').textContent =
      `Pay in ${fiat} → receive ${selectedCrypto}`;
  }
}

function selectProvider(p) {
  selectedProvider = p;
  document.querySelectorAll('.provider-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.provider === p);
  });
}

function validate() {
  let ok = true;
  const email = document.getElementById('input-email').value.trim();
  if (!email || !/^\S+@\S+\.\S+$/.test(email)) {
    document.getElementById('err-email').textContent = 'Valid email required';
    ok = false;
  } else {
    document.getElementById('err-email').textContent = '';
  }
  if (!LINK.amount) {
    const amt = parseFloat(document.getElementById('input-amount')?.value || '0');
    if (amt <= 0) {
      document.getElementById('err-amount').textContent = 'Enter a valid amount';
      ok = false;
    } else {
      document.getElementById('err-amount').textContent = '';
    }
  }
  return ok;
}

async function startPayment() {
  if (!validate()) return;
  const btn = document.getElementById('pay-btn');
  btn.disabled = true;
  btn.textContent = 'Processing…';

  const body = {
    link_id:         LINK.id,
    customer_email:  document.getElementById('input-email').value.trim(),
    customer_name:   document.getElementById('input-name').value.trim() || undefined,
    provider:        selectedProvider,
    crypto_currency: LINK.crypto_currency || selectedCrypto,
  };
  if (!LINK.amount) {
    body.amount = parseFloat(document.getElementById('input-amount').value);
  }

  try {
    const res = await fetch(`${LINK.base_url}/api/payments/initiate`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Failed to initiate payment');
    window.location.href = data.provider_url;
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Continue to Payment →';
    alert('Error: ' + e.message);
  }
}

window.onload = init;
</script>
</body>
</html>
