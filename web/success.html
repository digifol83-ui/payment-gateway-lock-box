<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Received</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
         background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
         min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#fff;border-radius:16px;padding:40px;max-width:440px;width:100%;
          box-shadow:0 20px 60px rgba(0,0,0,0.4);text-align:center}
    .icon-wrap{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;
               justify-content:center;margin:0 auto 24px}
    .icon-wrap.success{background:linear-gradient(135deg,#10b981,#059669)}
    .icon-wrap.processing{background:linear-gradient(135deg,#f59e0b,#d97706)}
    .icon-wrap.failed{background:linear-gradient(135deg,#ef4444,#dc2626)}
    .icon{font-size:36px}
    h2{font-size:24px;font-weight:800;color:#1a1a2e;margin-bottom:8px}
    .sub{color:#6b7280;font-size:15px;margin-bottom:28px;line-height:1.5}
    .details{background:#f9fafb;border-radius:12px;padding:20px;text-align:left;margin-bottom:24px}
    .detail-row{display:flex;justify-content:space-between;align-items:center;
                padding:8px 0;border-bottom:1px solid #e5e7eb;font-size:14px}
    .detail-row:last-child{border-bottom:none}
    .detail-label{color:#6b7280}
    .detail-value{font-weight:600;color:#1a1a2e}
    .status-badge{display:inline-block;padding:3px 10px;border-radius:20px;
                  font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
    .status-completed{background:#d1fae5;color:#065f46}
    .status-processing{background:#fef3c7;color:#92400e}
    .status-pending{background:#dbeafe;color:#1e40af}
    .status-failed{background:#fee2e2;color:#991b1b}
    .pid{font-family:monospace;font-size:11px;color:#9ca3af;margin-bottom:24px}
    .btn{display:inline-block;padding:12px 28px;border-radius:10px;font-weight:700;
         font-size:14px;cursor:pointer;border:none;text-decoration:none}
    .btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
    .btn-outline{background:#fff;color:#667eea;border:2px solid #667eea;margin-left:10px}
    .refresh-note{font-size:12px;color:#9ca3af;margin-top:16px}
  </style>
</head>
<body>
<div class="card">
  <div class="icon-wrap" id="icon-wrap">
    <div class="icon" id="icon">⏳</div>
  </div>
  <h2 id="title">Processing Payment</h2>
  <p class="sub" id="subtitle">Your payment is being processed. This usually takes 1–5 minutes.</p>

  <div class="details">
    <div class="detail-row">
      <span class="detail-label">Status</span>
      <span class="status-badge status-processing" id="status-badge">Processing</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Amount</span>
      <span class="detail-value" id="detail-amount">—</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Receiving</span>
      <span class="detail-value" id="detail-crypto">—</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Provider</span>
      <span class="detail-value" id="detail-provider">—</span>
    </div>
  </div>

  <div class="pid" id="pid"></div>

  <button class="btn btn-primary" onclick="checkStatus()">Check Status</button>

  <div class="refresh-note" id="refresh-note">
    Auto-refreshing every 10 seconds…
  </div>
</div>

<script>
const DATA = __PAYMENT_DATA__;
let pollInterval = null;

function capitalize(s){ return s ? s.charAt(0).toUpperCase()+s.slice(1) : s }

function applyStatus(status) {
  const badge = document.getElementById('status-badge');
  const iconWrap = document.getElementById('icon-wrap');
  const icon = document.getElementById('icon');
  badge.className = `status-badge status-${status}`;
  badge.textContent = capitalize(status);

  if (status === 'completed') {
    iconWrap.className = 'icon-wrap success';
    icon.textContent = '✓';
    document.getElementById('title').textContent = 'Payment Complete!';
    document.getElementById('subtitle').textContent =
      'Your crypto has been sent to your wallet. Check your wallet for the incoming transaction.';
    document.getElementById('refresh-note').textContent = '';
    clearInterval(pollInterval);
  } else if (status === 'failed' || status === 'cancelled') {
    iconWrap.className = 'icon-wrap failed';
    icon.textContent = '✗';
    document.getElementById('title').textContent = 'Payment Failed';
    document.getElementById('subtitle').textContent =
      'Something went wrong. Please try again or contact support.';
    clearInterval(pollInterval);
  } else {
    iconWrap.className = 'icon-wrap processing';
    icon.textContent = '⏳';
  }
}

function init() {
  document.getElementById('pid').textContent = 'Payment ID: ' + DATA.payment_id;
  const amt = DATA.amount
    ? DATA.amount.toLocaleString('en-US', {style:'currency', currency: DATA.fiat_currency || 'USD'})
    : '—';
  document.getElementById('detail-amount').textContent = amt;
  document.getElementById('detail-crypto').textContent = DATA.crypto_currency || '—';
  document.getElementById('detail-provider').textContent = capitalize(DATA.provider) || '—';
  applyStatus(DATA.status || 'processing');

  if (!['completed','failed','cancelled'].includes(DATA.status)) {
    pollInterval = setInterval(checkStatus, 10000);
  }
}

async function checkStatus() {
  try {
    const res = await fetch(`/api/payments/${DATA.payment_id}`);
    const p = await res.json();
    applyStatus(p.status);
    if (p.crypto_amount) {
      document.getElementById('detail-crypto').textContent =
        `${p.crypto_amount} ${p.crypto_currency}`;
    }
  } catch(e) { /* ignore network errors during poll */ }
}

window.onload = init;
</script>
</body>
</html>
