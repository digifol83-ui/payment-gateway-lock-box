steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/beastpay-api:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/beastpay-api:latest'
      - '-f'
      - 'Dockerfile'
      - '.'

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/beastpay-api:$SHORT_SHA'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    id: 'deploy-cloudrun'
    args:
      - run
      - '--filename=.'
      - '--image=gcr.io/$PROJECT_ID/beastpay-api:$SHORT_SHA'
      - '--location=us-central1'
      - '--config=app.yaml'

  # Step 4: Run tests (optional but recommended)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'run-tests'
    args:
      - 'run'
      - '--rm'
      - 'gcr.io/$PROJECT_ID/beastpay-api:$SHORT_SHA'
      - 'python'
      - '-m'
      - 'pytest'
      - 'tests/'
      - '-v'
    onFailure: ['ALLOW']  # Don't block deployment on test failure

options:
  machineType: 'N1_HIGHCPU_8'

images:
  - 'gcr.io/$PROJECT_ID/beastpay-api:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/beastpay-api:latest'

timeout: '1800s'
