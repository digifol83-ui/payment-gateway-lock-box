steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/beastpay-api:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/beastpay-api:latest'
      - '-f'
      - 'Dockerfile'
      - '.'

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/beastpay-api:$SHORT_SHA'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/run'
    id: 'deploy-cloudrun'
    args:
      - 'deploy'
      - 'beastpay-api'
      - '--image=gcr.io/$PROJECT_ID/beastpay-api:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=3600'
      - '--service-account=beastpay-sa@$PROJECT_ID.iam.gserviceaccount.com'

options:
  machineType: 'N1_HIGHCPU_8'

images:
  - 'gcr.io/$PROJECT_ID/beastpay-api:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/beastpay-api:latest'

timeout: '1800s'
